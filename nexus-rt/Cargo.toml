[package]
name = "nexus-rt"
version = "0.3.0"
description = "Single-threaded, event-driven runtime primitives with pre-resolved dispatch"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
smartptr = ["dep:nexus-smartptr"]
timer = ["dep:nexus-timer"]

[dependencies]
rustc-hash = "2"
nexus-smartptr = { version = "0.1", path = "../nexus-smartptr", optional = true }
nexus-timer = { version = "1.1", path = "../nexus-timer", optional = true }

[lints]
workspace = true
