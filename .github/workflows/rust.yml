name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run tests (all features, excluding nexus-net)
      run: cargo test --workspace --all-features --verbose --exclude nexus-net
    - name: Test nexus-net (default - sync)
      run: cargo test -p nexus-net --verbose
    - name: Test nexus-net (sync + TLS)
      run: cargo test -p nexus-net --features tls --verbose
    - name: Test nexus-net (async)
      run: cargo test -p nexus-net --lib --features nexus-rt --verbose
    - name: Test nexus-net (nexus-rt + TLS)
      run: cargo test -p nexus-net --lib --features nexus-rt,tls --verbose
    - name: Test nexus-net (tokio)
      run: cargo test -p nexus-net --lib --features tokio --verbose
    - name: Test nexus-net (tokio + TLS)
      run: cargo test -p nexus-net --lib --features tokio,tls --verbose
